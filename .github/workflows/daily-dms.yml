name: Daily Instagram DMs

on:
  schedule:
    - cron: '0 16 * * 1-5'  # 11 AM EST (UTC-5), Mon–Fri only
  workflow_dispatch:

jobs:
  send-dms:
    runs-on: ubuntu-latest
    timeout-minutes: 180     # 15 DMs × up to 8 min human delay each = ~2 hrs max
    permissions:
      contents: write

    env:
      IG_USERNAME: ${{ secrets.IG_USERNAME }}
      IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
      IG_PROXY:    ${{ secrets.IG_PROXY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send DMs
        run: python3 dm_sender.py

      - name: Commit session + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ig_session.json ig_dms.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update ig state [skip ci]"
          git push
